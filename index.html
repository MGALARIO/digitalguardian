<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Guardian</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --text: #cfe8ff;
    --muted: #7a93a8;
    --accent: #49e0ff;
    --power: #ff4444;
    --power-dim: #6b1a1a;
    --success: #44ff88;
    --mono: 'Fira Code', monospace;
    --sans: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Circuit board SVG - full screen background */
  .circuit-board {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Center stage */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Header - hidden until powered on */
  .header {
    text-align: center;
    margin-bottom: 60px;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }

  .header.revealed {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .header h1 {
    font-family: var(--mono);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    letter-spacing: -1px;
  }

  .header .subtitle {
    font-family: var(--mono);
    font-size: clamp(0.8rem, 1.5vw, 0.95rem);
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Power button */
  .power-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .power-btn {
    position: relative;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1e1e30, #080810);
    border: 2px solid var(--power-dim);
    cursor: pointer;
    transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 20px rgba(180, 30, 30, 0.25),
      inset 0 0 30px rgba(0, 0, 0, 0.8);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .power-btn::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px dashed rgba(180, 30, 30, 0.3);
    animation: spin-slow 20s linear infinite;
  }

  .power-btn::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px dashed rgba(180, 30, 30, 0.15);
    animation: spin-slow 30s linear infinite reverse;
  }

  .power-btn:hover {
    border-color: var(--power);
    box-shadow:
      0 0 40px rgba(255, 50, 50, 0.5),
      0 0 80px rgba(255, 50, 50, 0.2),
      inset 0 0 30px rgba(255, 50, 50, 0.1);
    transform: scale(1.05);
  }

  .power-btn.active {
    border-color: var(--success);
    box-shadow:
      0 0 50px rgba(68, 255, 136, 0.6),
      0 0 100px rgba(68, 255, 136, 0.25),
      inset 0 0 30px rgba(68, 255, 136, 0.15);
  }

  .power-btn.active::before {
    border-color: rgba(68, 255, 136, 0.4);
    animation-duration: 8s;
  }

  .power-btn.active::after {
    border-color: rgba(68, 255, 136, 0.2);
  }

  .power-icon {
    width: 46px;
    height: 46px;
    color: var(--power);
    transition: color 0.4s ease, filter 0.4s ease;
    filter: drop-shadow(0 0 6px rgba(255,50,50,0.5));
  }

  .power-btn.active .power-icon {
    color: var(--success);
    filter: drop-shadow(0 0 10px rgba(68,255,136,0.8));
  }

  @keyframes spin-slow {
    to { transform: rotate(360deg); }
  }

  .power-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: rgba(120, 80, 80, 0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.5s ease;
  }

  .power-label.active {
    color: var(--success);
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
    padding: 10px 24px;
    background: rgba(5, 5, 8, 0.9);
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: rgba(100,120,140,0.5);
    transition: color 0.5s ease;
  }

  .footer.active {
    color: var(--muted);
    border-top-color: rgba(73,224,255,0.1);
  }

  .footer .status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(80,80,80,0.5);
    transition: background 0.5s ease, box-shadow 0.5s ease;
  }

  .footer.active .status-dot {
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<svg class="circuit-board" id="circuitBoard" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"></svg>

<div class="stage">
  <div class="header" id="header">
    <h1>Digital Guardian</h1>
    <div class="subtitle">The power is in your hands</div>
  </div>

  <div class="power-section">
    <button class="power-btn" id="powerBtn" aria-label="Power On">
      <svg class="power-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v10"/>
        <path d="M18.4 6.6a9 9 0 1 1-12.8 0"/>
      </svg>
    </button>
    <div class="power-label" id="powerLabel">Power On</div>
  </div>
</div>

<div class="footer" id="footer">
  <div class="status">
    <div class="status-dot"></div>
    <span id="statusText">Standby</span>
  </div>
  <span>Digital Guardian v1.0</span>
</div>

<script>
const powerBtn  = document.getElementById('powerBtn');
const board     = document.getElementById('circuitBoard');
const header    = document.getElementById('header');
const footer    = document.getElementById('footer');
const label     = document.getElementById('powerLabel');
const statusTxt = document.getElementById('statusText');
const NS = 'http://www.w3.org/2000/svg';
let isOn = false;
let traceEls = [];

// ── Maze-style PCB trace routes (right-angle only, radiating from 960,540) ──
// Each string is one continuous trace path
const TRACES = [
  // Layer 1 – main arteries from center
  'M960,540 L960,420 L840,420 L840,300 L720,300 L720,180 L600,180 L600,60',
  'M960,540 L960,420 L1080,420 L1080,300 L1200,300 L1200,180 L1320,180 L1320,60',
  'M960,540 L840,540 L840,660 L720,660 L720,780 L600,780 L600,900 L480,900',
  'M960,540 L1080,540 L1080,660 L1200,660 L1200,780 L1320,780 L1320,900 L1440,900',
  'M960,540 L960,660 L960,780 L840,780 L840,900 L960,900 L960,1020',
  // Layer 2 – horizontal bus left
  'M840,420 L720,420 L720,300',
  'M720,420 L600,420 L600,300 L480,300 L480,180',
  'M600,420 L480,420 L360,420 L360,300 L240,300 L240,180 L120,180',
  'M360,420 L360,540 L240,540 L120,540',
  'M240,540 L240,660 L120,660',
  'M240,660 L240,780 L120,780',
  // Layer 3 – horizontal bus right
  'M1080,420 L1200,420 L1200,300',
  'M1200,420 L1320,420 L1320,300 L1440,300 L1440,180',
  'M1320,420 L1440,420 L1560,420 L1560,300 L1680,300 L1680,180 L1800,180',
  'M1560,420 L1560,540 L1680,540 L1800,540',
  'M1680,540 L1680,660 L1800,660',
  'M1680,660 L1680,780 L1800,780',
  // Layer 4 – lower horizontals
  'M840,660 L720,660',
  'M720,660 L600,660 L600,780',
  'M480,300 L480,420 L360,420',
  'M120,540 L120,420 L240,420 L240,300',
  'M1440,420 L1440,540 L1560,540',
  'M1800,540 L1800,420 L1680,420 L1680,300',
  // Layer 5 – edge traces top
  'M600,60 L480,60 L480,180',
  'M1320,60 L1440,60 L1440,180',
  'M480,180 L360,180 L360,60',
  'M1440,180 L1560,180 L1560,60',
  // Layer 6 – edge traces bottom
  'M480,900 L360,900 L360,1020',
  'M1440,900 L1560,900 L1560,1020',
  'M960,1020 L840,1020 L720,1020',
  'M960,1020 L1080,1020 L1200,1020',
];

// Groups: each inner array runs in parallel, groups run in sequence
const GROUPS = [
  [0, 1, 2, 3, 4],
  [5, 6, 11, 12, 17, 18],
  [7, 8, 13, 14, 19, 20, 21, 22],
  [9, 10, 15, 16, 23, 24, 25, 26],
  [27, 28, 29, 30],
];

const SPEED = 700; // ms per trace

function buildBoard() {
  board.innerHTML = '';
  traceEls = [];
  TRACES.forEach(d => {
    // dim always-visible base
    const base = document.createElementNS(NS, 'path');
    base.setAttribute('d', d);
    base.setAttribute('stroke', '#0d1a25');
    base.setAttribute('stroke-width', '1.5');
    base.setAttribute('fill', 'none');
    base.setAttribute('stroke-linecap', 'round');
    base.setAttribute('stroke-linejoin', 'round');
    board.appendChild(base);

    // lit overlay, hidden
    const lit = document.createElementNS(NS, 'path');
    lit.setAttribute('d', d);
    lit.setAttribute('stroke', '#49e0ff');
    lit.setAttribute('stroke-width', '1.5');
    lit.setAttribute('fill', 'none');
    lit.setAttribute('stroke-linecap', 'round');
    lit.setAttribute('stroke-linejoin', 'round');
    lit.style.opacity = '0';
    lit.style.filter = 'drop-shadow(0 0 5px rgba(73,224,255,0.9))';
    board.appendChild(lit);

    traceEls.push(lit);
  });
}

function animateTrace(lit, dur) {
  return new Promise(res => {
    const len = lit.getTotalLength();
    lit.style.strokeDasharray  = len;
    lit.style.strokeDashoffset = len;
    lit.style.opacity = '1';

    // glowing dot head
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('r', '3.5');
    dot.setAttribute('fill', '#ffffff');
    dot.style.filter = 'drop-shadow(0 0 8px #49e0ff) drop-shadow(0 0 16px #49e0ff)';
    board.appendChild(dot);

    const t0 = performance.now();
    (function frame(t) {
      const k  = Math.min(1, (t - t0) / dur);
      const pt = lit.getPointAtLength(k * len);
      dot.setAttribute('cx', pt.x);
      dot.setAttribute('cy', pt.y);
      lit.style.strokeDashoffset = len * (1 - k);
      if (k < 1) requestAnimationFrame(frame);
      else {
        dot.remove();
        lit.style.strokeDasharray  = '';
        lit.style.strokeDashoffset = '';
        res();
      }
    })(t0);
  });
}

async function powerOn() {
  for (const group of GROUPS) {
    await Promise.all(group.map(i => animateTrace(traceEls[i], SPEED)));
  }
  // Reveal header after circuit completes
  header.classList.add('revealed');
  footer.classList.add('active');
  statusTxt.textContent = 'System Online';
  label.classList.add('active');
  label.textContent = 'Power On';
}

function powerOff() {
  traceEls.forEach(el => {
    el.style.opacity = '0';
    el.style.strokeDasharray  = '';
    el.style.strokeDashoffset = '';
  });
  // Remove all lingering dots
  board.querySelectorAll('circle').forEach(c => c.remove());
  header.classList.remove('revealed');
  footer.classList.remove('active');
  statusTxt.textContent = 'Standby';
  label.classList.remove('active');
  label.textContent = 'Power On';
}

buildBoard();

powerBtn.addEventListener('click', async () => {
  if (isOn) {
    isOn = false;
    powerBtn.classList.remove('active');
    powerOff();
  } else {
    isOn = true;
    powerBtn.classList.add('active');
    await powerOn();
  }
});
</script>
</body>
</html>
